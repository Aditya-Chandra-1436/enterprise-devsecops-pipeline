name: Enterprise DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - dev
      - staging

jobs:

# =========================
# SECURITY SCANNING STAGE
# =========================

  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:

      # Checkout Code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # GITLEAKS SECRET SCAN
      # =========================
      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2

      # =========================
      # SEMGREP SAST SCAN
      # =========================
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST Scan
        run: |
          semgrep scan --config auto

      # =========================
      # TRIVY FILESYSTEM SCAN
      # FAIL ONLY ON CRITICAL
      # =========================
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      # =========================
      # CHECKOV IaC SCAN
      # =========================
      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          framework: terraform,dockerfile

# =========================
# BUILD AND PUSH IMAGE
# =========================

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: security-scan

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # FETCH VAULT SECRETS
      # =========================
      - name: Import Vault Secrets
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/devsecops dockerhub_username | DOCKER_USERNAME ;
            secret/data/devsecops dockerhub_password | DOCKER_PASSWORD

      # =========================
      # DOCKER LOGIN
      # =========================
      - name: Docker Login
        run: |
          echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin

      # =========================
      # BUILD IMAGE
      # =========================
      - name: Build Docker Image
        run: |
          docker build -t aditya1436/enterprise-devsecops-app:latest .

      # =========================
      # TRIVY IMAGE SCAN
      # FAIL ONLY ON CRITICAL
      # =========================
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aditya1436/enterprise-devsecops-app:latest
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      # =========================
      # PUSH IMAGE
      # =========================
      - name: Push Docker Image
        run: |
          docker push aditya1436/enterprise-devsecops-app:latest

# =========================
# TERRAFORM PROVISIONING
# =========================

  terraform:
    name: Terraform Provisioning
    runs-on: ubuntu-latest
    needs: build-and-push

    outputs:
      public_ip: ${{ steps.get_ip.outputs.public_ip }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # FETCH AWS CREDS FROM VAULT
      # =========================
      - name: Import Vault Secrets
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/devsecops aws_access_key | AWS_ACCESS_KEY_ID ;
            secret/data/devsecops aws_secret_key | AWS_SECRET_ACCESS_KEY

      # =========================
      # SETUP TERRAFORM
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =========================
      # TERRAFORM INIT
      # =========================
      - name: Terraform Init
        run: terraform init

      # =========================
      # TERRAFORM VALIDATE
      # =========================
      - name: Terraform Validate
        run: terraform validate

      # =========================
      # TERRAFORM PLAN
      # =========================
      - name: Terraform Plan
        run: terraform plan

      # =========================
      # TERRAFORM APPLY
      # =========================
      - name: Terraform Apply
        run: terraform apply -auto-approve

      # =========================
      # GET EC2 PUBLIC IP
      # =========================
      - name: Get EC2 Public IP
        id: get_ip
        run: |
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

# =========================
# DEPLOYMENT STAGE
# =========================

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: terraform

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # FETCH VAULT SECRETS
      # =========================
      - name: Import Vault Secrets
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/devsecops dockerhub_username | DOCKER_USERNAME ;
            secret/data/devsecops dockerhub_password | DOCKER_PASSWORD

      # =========================
      # SSH KEY
      # =========================
      - name: Configure SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 400 key.pem

      # =========================
      # WAIT FOR EC2
      # =========================
      - name: Wait for EC2
        run: sleep 180

      # =========================
      # DEPLOY TO EC2
      # =========================
      - name: Deploy Docker Container
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ needs.terraform.outputs.public_ip }} << EOF

          docker login -u ${DOCKER_USERNAME} -p ${DOCKER_PASSWORD}

          docker pull aditya1436/enterprise-devsecops-app:latest

          docker stop dev || true
          docker rm dev || true

          docker stop staging || true
          docker rm staging || true

          docker stop prod || true
          docker rm prod || true

          docker run -d \
            --name dev \
            -p 3000:3000 \
            aditya1436/enterprise-devsecops-app:latest

          docker run -d \
            --name staging \
            -p 3001:3000 \
            aditya1436/enterprise-devsecops-app:latest

          docker run -d \
            --name prod \
            -p 3002:3000 \
            aditya1436/enterprise-devsecops-app:latest

          EOF
