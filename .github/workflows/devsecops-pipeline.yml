name: Enterprise DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  security-scans:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto .

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .

  build-and-deploy:
    needs: security-scans
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch AWS Secrets From Vault
        run: |
          sudo apt-get update
          sudo apt-get install jq -y

          export VAULT_ADDR=${{ secrets.VAULT_ADDR }}
          export VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}

          curl \
            --header "X-Vault-Token: $VAULT_TOKEN" \
            $VAULT_ADDR/v1/secret/data/aws \
            > aws.json

          echo "AWS_ACCESS_KEY_ID=$(jq -r '.data.data.AWS_ACCESS_KEY_ID' aws.json)" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(jq -r '.data.data.AWS_SECRET_ACCESS_KEY' aws.json)" >> $GITHUB_ENV
          echo "AWS_REGION=$(jq -r '.data.data.AWS_REGION' aws.json)" >> $GITHUB_ENV

      - name: Fetch DockerHub Secrets From Vault
        run: |
          export VAULT_ADDR=${{ secrets.VAULT_ADDR }}
          export VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}

          curl \
            --header "X-Vault-Token: $VAULT_TOKEN" \
            $VAULT_ADDR/v1/secret/data/dockerhub \
            > dockerhub.json

          echo "DOCKER_USERNAME=$(jq -r '.data.data.username' dockerhub.json)" >> $GITHUB_ENV
          echo "DOCKER_PASSWORD=$(jq -r '.data.data.password' dockerhub.json)" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve \
            -var="aws_region=${AWS_REGION}"

      - name: Get Deployment Server IP
        run: |
          cd terraform
          echo "DEPLOY_IP=$(terraform output -raw deployment_server_ip)" >> $GITHUB_ENV

      - name: Wait For EC2 Startup
        run: sleep 60

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t $DOCKER_USERNAME/enterprise-devsecops:latest .

      - name: Push Docker Image
        run: |
          docker push $DOCKER_USERNAME/enterprise-devsecops:latest

      - name: Deploy Containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.DEPLOY_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            docker pull $DOCKER_USERNAME/enterprise-devsecops:latest

            docker rm -f dev-app || true
            docker rm -f staging-app || true
            docker rm -f prod-app || true

            docker run -d \
              --name dev-app \
              -p 3000:3000 \
              $DOCKER_USERNAME/enterprise-devsecops:latest

            docker run -d \
              --name staging-app \
              -p 3001:3000 \
              $DOCKER_USERNAME/enterprise-devsecops:latest

            docker run -d \
              --name prod-app \
              -p 3002:3000 \
              $DOCKER_USERNAME/enterprise-devsecops:latest
