name: Enterprise DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - fully-automated-devsecops

jobs:

  security-scans:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        run: |
          python3 -m pip install semgrep

          semgrep scan \
            --config auto \
            .

      - name: Run Trivy FileSystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .

  build-and-deploy:

    needs: security-scans

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip curl

      - name: Fetch AWS Credentials From Vault
        run: |

          export VAULT_ADDR=${{ secrets.VAULT_ADDR }}
          export VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}

          curl \
            --silent \
            --header "X-Vault-Token: $VAULT_TOKEN" \
            $VAULT_ADDR/v1/secret/data/aws \
            > aws.json

          echo "AWS_ACCESS_KEY_ID=$(jq -r '.data.data.AWS_ACCESS_KEY_ID' aws.json)" >> $GITHUB_ENV

          echo "AWS_SECRET_ACCESS_KEY=$(jq -r '.data.data.AWS_SECRET_ACCESS_KEY' aws.json)" >> $GITHUB_ENV

          echo "AWS_REGION=$(jq -r '.data.data.AWS_REGION' aws.json)" >> $GITHUB_ENV

      - name: Fetch DockerHub Credentials From Vault
        run: |

          export VAULT_ADDR=${{ secrets.VAULT_ADDR }}
          export VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}

          curl \
            --silent \
            --header "X-Vault-Token: $VAULT_TOKEN" \
            $VAULT_ADDR/v1/secret/data/dockerhub \
            > dockerhub.json

          echo "DOCKER_USERNAME=$(jq -r '.data.data.username' dockerhub.json)" >> $GITHUB_ENV

          echo "DOCKER_PASSWORD=$(jq -r '.data.data.password' dockerhub.json)" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: |
          terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply \
            -auto-approve \
            -var="aws_region=${AWS_REGION}"

      - name: Get Deployment Server IP
        working-directory: terraform
        run: |
          echo "DEPLOY_IP=$(terraform output -raw deployment_server_ip)" >> $GITHUB_ENV

      - name: Wait For EC2 Initialization
        run: |
          echo "Waiting for EC2 + Docker setup..."
          sleep 90

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t $DOCKER_USERNAME/enterprise-devsecops:latest \
            .

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/enterprise-devsecops:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image
        run: |
          docker push \
            $DOCKER_USERNAME/enterprise-devsecops:latest

      - name: Deploy Containers To EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.DEPLOY_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            docker pull $DOCKER_USERNAME/enterprise-devsecops:latest

            docker rm -f dev-app || true
            docker rm -f staging-app || true
            docker rm -f prod-app || true

            docker run -d \
              --name dev-app \
              -p 3000:3000 \
              $DOCKER_USERNAME/enterprise-devsecops:latest

            docker run -d \
              --name staging-app \
              -p 3001:3000 \
              $DOCKER_USERNAME/enterprise-devsecops:latest

            docker run -d \
              --name prod-app \
              -p 3002:3000 \
              $DOCKER_USERNAME/enterprise-devsecops:latest

      - name: Deployment Success
        run: |
          echo "Enterprise DevSecOps Pipeline Deployment Completed Successfully"
