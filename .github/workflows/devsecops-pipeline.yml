name: Enterprise DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  security-scans:
    runs-on: ubuntu-latest

    steps:

      # CHECKOUT SOURCE CODE
      - name: Checkout Code
        uses: actions/checkout@v4

      # INSTALL GITLEAKS
      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      # SECRET SCANNING
      - name: Run Gitleaks Scan
        run: |
          gitleaks detect --source . --verbose

      # SAST SCANNING
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/security-audit"

      # FILESYSTEM DEPENDENCY SCAN
      # Logs HIGH + CRITICAL vulnerabilities
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      # POLICY GATE
      # FAILS PIPELINE ONLY FOR CRITICAL VULNERABILITIES
      - name: Enforce Critical Filesystem Policy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'

      # IAC SCANNING
      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .

  build-and-scan:
    needs: security-scans
    runs-on: ubuntu-latest

    steps:

      # CHECKOUT CODE
      - name: Checkout Code
        uses: actions/checkout@v4

      # BUILD DOCKER IMAGE
      - name: Build Docker Image
        run: |
          docker build -t enterprise-devsecops .

      # INSTALL TRIVY
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release jq -y

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install trivy -y

      # CONTAINER IMAGE SCAN
      # LOGS HIGH + CRITICAL VULNERABILITIES
      - name: Scan Docker Image
        run: |
          trivy image \
          --severity HIGH,CRITICAL \
          --exit-code 0 \
          enterprise-devsecops

      # POLICY GATE
      # FAILS ONLY FOR CRITICAL VULNERABILITIES
      - name: Enforce Critical Image Policy
        run: |
          trivy image \
          --severity CRITICAL \
          --exit-code 1 \
          enterprise-devsecops

      # INSTALL VAULT
      - name: Install Vault
        run: |
          wget https://releases.hashicorp.com/vault/1.17.2/vault_1.17.2_linux_amd64.zip
          unzip vault_1.17.2_linux_amd64.zip
          sudo mv vault /usr/local/bin/

      # AUTHENTICATE TO VAULT
      - name: Authenticate to Vault
        run: |
          export VAULT_ADDR="http://${{ secrets.EC2_HOST }}:8200"

          vault write auth/approle/login \
            role_id="${{ secrets.VAULT_ROLE_ID }}" \
            secret_id="${{ secrets.VAULT_SECRET_ID }}" \
            -format=json > vault-token.json

          VAULT_TOKEN=$(cat vault-token.json | jq -r '.auth.client_token')

          echo "VAULT_ADDR=http://${{ secrets.EC2_HOST }}:8200" >> $GITHUB_ENV
          echo "VAULT_TOKEN=$VAULT_TOKEN" >> $GITHUB_ENV

      # FETCH DOCKERHUB CREDENTIALS FROM VAULT
      - name: Fetch Docker Credentials
        run: |
          USERNAME=$(vault kv get -field=username secret/dockerhub)
          PASSWORD=$(vault kv get -field=password secret/dockerhub)

          echo "DOCKER_USERNAME=$USERNAME" >> $GITHUB_ENV
          echo "DOCKER_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      # LOGIN TO DOCKER HUB
      - name: Docker Login
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      # TAG IMAGE
      - name: Tag Docker Image
        run: |
          docker tag enterprise-devsecops aditya1436/enterprise-devsecops:latest

      # PUSH IMAGE TO DOCKER HUB
      - name: Push Docker Image
        run: |
          docker push aditya1436/enterprise-devsecops:latest

  deploy-dev:
    needs: build-and-scan
    runs-on: ubuntu-latest

    steps:

      # DEPLOY TO DEVELOPMENT
      - name: Deploy to Development
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull aditya1436/enterprise-devsecops:latest

            docker stop dev-app || true
            docker rm dev-app || true

            docker run -d \
              --name dev-app \
              -p 3000:3000 \
              aditya1436/enterprise-devsecops:latest

  deploy-staging:
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:

      # DEPLOY TO STAGING
      - name: Deploy to Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull aditya1436/enterprise-devsecops:latest

            docker stop staging-app || true
            docker rm staging-app || true

            docker run -d \
              --name staging-app \
              -p 3001:3000 \
              aditya1436/enterprise-devsecops:latest

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:

      # DEPLOY TO PRODUCTION
      - name: Deploy to Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull aditya1436/enterprise-devsecops:latest

            docker stop prod-app || true
            docker rm prod-app || true

            docker run -d \
              --name prod-app \
              -p 3002:3000 \
              aditya1436/enterprise-devsecops:latest
